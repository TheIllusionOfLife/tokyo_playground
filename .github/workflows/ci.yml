name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - run: bun install --frozen-lockfile

      - name: Lint
        run: npx biome check src/

      - name: Compile
        run: npx rbxtsc
